# golangci-lint v2 config. CI and the prek commit hook run this — never run it
# by hand (the go capt-hook pack blocks manual invocation). `golangci-lint fmt`
# applies the formatters; `golangci-lint run` applies the linters.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - contextcheck
    - durationcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - prealloc
    - revive
    - staticcheck
    - unused
  exclusions:
    rules:
      # gosec's filesystem checks (G301/G304/G306) over t.TempDir/os.MkdirTemp
      # paths are false positives in tests: the paths are test-controlled, not
      # attacker-supplied, and the perms are irrelevant to throwaway fixtures.
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports
