name: Release

# Tag-driven release. Pushing a vX.Y.Z tag cross-compiles static binaries, smoke-tests
# them, publishes a SHA256SUMS manifest, then renders Formula/cc-notes.rb and publishes
# it to the tap through the shared homebrew-tap actions.

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      marketing: ${{ steps.derive.outputs.marketing }}
    steps:
      - id: derive
        name: Derive the numeric helper marketing version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "marketing=${version%%-*}" >> "$GITHUB_OUTPUT"

  web-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - name: Verify the immutable tag is an exact main ancestor
        run: |
          set -euo pipefail
          printf '%s\n' "$RELEASE_TAG" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          tag_commit="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          test "$tag_commit" = "$(git rev-parse HEAD)"
          if [ "$GITHUB_EVENT_NAME" = push ]; then
            test "$tag_commit" = "$GITHUB_SHA"
          fi
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main

  pure:
    name: pure ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [verify-tag-on-main, web-dist, version]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/web-dist
      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          COMMIT="$GITHUB_SHA"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${RELEASE_TAG} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          CGO_ENABLED=0 go build -tags webui -ldflags "$LDFLAGS" -o "dist/cc-notes_${GOOS}_${GOARCH}" ./cmd/cc-notes
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  smoke-linux:
    name: smoke linux
    runs-on: ubuntu-latest
    needs: [pure]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cc-notes_linux_amd64
          path: bin
      - name: Smoke linux binary
        run: |
          chmod +x bin/cc-notes_linux_amd64
          bin/cc-notes_linux_amd64 version | grep -q "${RELEASE_TAG}"

  smoke-macos:
    name: smoke macos (pure, no live mount)
    runs-on: macos-latest
    needs: [pure]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cc-notes_darwin_arm64
          path: bin
      - name: Smoke pure darwin binary
        run: |
          chmod +x bin/cc-notes_darwin_arm64
          BIN="$PWD/bin/cc-notes_darwin_arm64"
          "$BIN" version | grep -q "${RELEASE_TAG}"
          export HOME="$RUNNER_TEMP/ccn-home"
          mkdir -p "$HOME"
          REMOTE="$RUNNER_TEMP/ccn-remote"
          REPO="$RUNNER_TEMP/ccn-repo"
          git init -q --bare "$REMOTE"
          mkdir -p "$REPO"
          cd "$REPO"
          git init -q
          git config user.name smoke
          git config user.email smoke@example.com
          git remote add origin "$REMOTE"
          # Signed-helper deployment starts a real FuseKit mount and belongs in
          # the VM gate, never on a hosted release runner.
          "$BIN" note add "smoke test note"
          out="$("$BIN" note list)"
          echo "$out"
          echo "$out" | grep -q "smoke test note"

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: [pure, smoke-linux, smoke-macos, helper-app]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: cc-notes_*
          path: artifacts
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.helper-app.outputs.artifact_name }}
          path: helper-artifact
      - name: Assemble dist and checksums
        env:
          HELPER_ASSET_FILENAME: ${{ needs.helper-app.outputs.asset_filename }}
          HELPER_ASSET_URL: ${{ needs.helper-app.outputs.asset_url }}
          HELPER_SHA256: ${{ needs.helper-app.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p dist
          test "$HELPER_ASSET_FILENAME" = "cc-notes-helper-${RELEASE_TAG}-darwin.zip"
          find artifacts -type f -name 'cc-notes_*' -exec cp {} dist/ \;
          mapfile -t helper_assets < <(find helper-artifact -type f -name "$HELPER_ASSET_FILENAME")
          test "${#helper_assets[@]}" = 1
          cp "${helper_assets[0]}" "dist/$HELPER_ASSET_FILENAME"
          helper_sidecar="${helper_assets[0]}.sha256"
          test -f "$helper_sidecar"
          cp "$helper_sidecar" "dist/$HELPER_ASSET_FILENAME.sha256"
          (cd dist && sha256sum -c "$HELPER_ASSET_FILENAME.sha256")
          test "$(sha256sum "dist/$HELPER_ASSET_FILENAME" | awk '{print $1}')" = "$HELPER_SHA256"
          test "$HELPER_ASSET_URL" = "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${HELPER_ASSET_FILENAME}"
          checksums="$(mktemp)"
          (
            cd dist
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' \
              | LC_ALL=C sort -z \
              | xargs -0 sha256sum > "$checksums"
          )
          mv "$checksums" dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt
          find dist -maxdepth 1 -type f -print | LC_ALL=C sort \
            > "$RUNNER_TEMP/cc-notes-release-assets.txt"
      - name: Stage and verify the exact draft release
        id: stage-release
        uses: yasyf/homebrew-tap/.github/actions/stage-draft-release@e4c3108e693681df1a3c666bae80e890bc44cf3e
        with:
          token: ${{ github.token }}
          tag: ${{ env.RELEASE_TAG }}
          title: ${{ env.RELEASE_TAG }}
          manifest: ${{ runner.temp }}/cc-notes-release-assets.txt
          prerelease: ${{ contains(github.ref_name, '-') }}
      - name: Publish the exact verified release
        uses: yasyf/homebrew-tap/.github/actions/publish-draft-release@54e3e194bda69896894a82c17fcdb2822beefab5
        with:
          token: ${{ github.token }}
          release-id: ${{ steps.stage-release.outputs.release-id }}
          tag: ${{ env.RELEASE_TAG }}
          manifest: ${{ runner.temp }}/cc-notes-release-assets.txt
          prerelease: ${{ contains(github.ref_name, '-') }}
          make-latest: ${{ !contains(github.ref_name, '-') }}

  helper-app:
    name: fixed signed helper app
    needs: [verify-tag-on-main, version]
    permissions:
      contents: read
    uses: yasyf/homebrew-tap/.github/workflows/release-app.yml@83ee384b1d4fe25a8e4aa7258bb76d55e1593735
    with:
      app_name: CCNotesHelper
      asset_name: cc-notes-helper
      project_dir: helper-app
      scheme: CCNotesHelper
      bundle_id: com.yasyf.cc-notes.helper
      marketing_version: ${{ needs.version.outputs.marketing }}
      assert_script: .github/scripts/assert-helper-app.sh
      go_version: 1.26.5
      go_cache_dependency_path: go.sum
      prebuild_brew_packages: macos-fuse-t/cask/fuse-t
      prebuild_script: helper-app/prepare-release.sh
    secrets:
      MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
      MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
      MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

  bump-formula:
    runs-on: ubuntu-latest
    needs: [release, helper-app]
    # Prerelease tags (v1.2.3-rc.1) publish assets but never touch the formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      # The formula template is part of the immutable release source.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Extract asset checksums
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$RELEASE_TAG" --pattern SHA256SUMS.txt --output sums.txt
          sha() { awk -v a="$1" '$2 == a {print $1}' sums.txt; }
          da="$(sha cc-notes_darwin_arm64)"; dx="$(sha cc-notes_darwin_amd64)"
          la="$(sha cc-notes_linux_arm64)"; lx="$(sha cc-notes_linux_amd64)"
          helper="$(sha "cc-notes-helper-${RELEASE_TAG}-darwin.zip")"
          test -n "$da" && test -n "$dx" && test -n "$la" && test -n "$lx" && test -n "$helper"
          {
            echo "darwin_arm64=$da"
            echo "darwin_amd64=$dx"
            echo "linux_amd64=$lx"
            echo "linux_arm64=$la"
            echo "helper=$helper"
          } >> "$GITHUB_OUTPUT"
      - name: Resolve formula version
        id: version
        run: echo "value=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Render Formula/cc-notes.rb
        uses: yasyf/homebrew-tap/.github/actions/render-formula@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          template: .github/formula/cc-notes.rb.tmpl
          output: Formula/cc-notes.rb
          version: ${{ steps.version.outputs.value }}
          substitutions: |
            __SHA_DARWIN_ARM64__=${{ steps.shas.outputs.darwin_arm64 }}
            __SHA_DARWIN_AMD64__=${{ steps.shas.outputs.darwin_amd64 }}
            __SHA_LINUX_AMD64__=${{ steps.shas.outputs.linux_amd64 }}
            __SHA_LINUX_ARM64__=${{ steps.shas.outputs.linux_arm64 }}
            __SHA_HELPER__=${{ steps.shas.outputs.helper }}
      - name: Publish the exact CLI to the tap
        uses: yasyf/homebrew-tap/.github/actions/publish@9ca67392d45d66b6ae01e262383c8f3138d56f5e
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "cc-notes ${{ github.ref_name }}"

  # The Claude plugin ships in lockstep with the binary: every tag rewrites
  # plugin.json's version to the released tag so consumer plugin caches — which
  # refresh only when the version increases — pick up the matching pack. The
  # shared plugin autobump guards cc-notes (see .github/workflows/autobump.yml),
  # leaving the version to this job.
  sync-plugin-version:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: main
          fetch-depth: 0
      - name: Sync plugin.json version to the released tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          FILE=plugin/.claude-plugin/plugin.json

          python3 - "$VERSION" "$FILE" <<'PY'
          import json, pathlib, re, sys
          target, path = sys.argv[1], pathlib.Path(sys.argv[2])
          text = path.read_text()
          if json.loads(text)["version"] == target:
              sys.exit(0)
          new = re.sub(r'(^\s*"version":\s*")[^"]*(")', rf'\g<1>{target}\g<2>', text, count=1, flags=re.M)
          assert json.loads(new)["version"] == target, "version substitution did not take"
          path.write_text(new)
          PY

          if git diff --quiet -- "$FILE"; then
            echo "plugin.json already at $VERSION; nothing to sync"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore(release): sync plugin.json to $VERSION [skip ci]"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "pushed plugin.json sync on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt)"
          done
          echo "::error::failed to push plugin.json sync after 3 attempts"
          exit 1
