name: Release

# Tag-driven release. Pushing a vX.Y.Z tag cross-compiles the pure static binaries
# (CGO off) plus the FUSE variants (cgo, -tags fuse), smoke-tests that they run on a
# host WITHOUT a fuse library installed, publishes them with a SHA256SUMS manifest to
# the GitHub release, then renders Formula/cc-notes.rb and publishes it to the tap via
# the shared homebrew-tap actions. scripts/install.sh downloads these assets,
# preferring the _fuse build where one exists.

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: yasyf/homebrew-tap/.github/actions/verify-tag-on-main@v1

  pure:
    name: pure ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${GITHUB_REF_NAME} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o "dist/cc-notes_${GOOS}_${GOARCH}" ./cmd/cc-notes
      - uses: actions/upload-artifact@v7
        with:
          name: cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  fuse-macos:
    name: fuse darwin (arm64 + amd64)
    needs: verify-tag-on-main
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install fuse-t (build-time headers only)
        # cgofuse compiles against fuse.h; fuse-t ships the headers. The library
        # itself is dlopened lazily at runtime, so it is uninstalled before the smoke
        # step below.
        run: brew install macos-fuse-t/cask/fuse-t

      - name: Import Developer ID certificate
        uses: yasyf/homebrew-tap/.github/actions/import-developer-id@v1
        with:
          p12: ${{ secrets.MACOS_SIGN_P12 }}
          p12-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          notary-key: ${{ secrets.MACOS_NOTARY_KEY }}
          notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Build, sign, notarize the darwin fuse variants
        # disable-library-validation: the fuse build dlopens libfuse-t (another team's
        # dylib) under hardened runtime. macOS 15/26 SIGKILL ad-hoc/Team-less sigs.
        env:
          MACOS_CODESIGN_DISABLE_LIBRARY_VALIDATION: "1"
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${GITHUB_REF_NAME} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          # Native arm64 slice.
          CGO_ENABLED=1 GOARCH=arm64 go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/cc-notes_darwin_arm64_fuse ./cmd/cc-notes
          # amd64 slice cross-compiles against the fat macOS SDK.
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/cc-notes_darwin_amd64_fuse ./cmd/cc-notes
          # Developer ID sign + notarize each darwin binary via the shared script.
          bash "$MACOS_CODESIGN_SCRIPT" dist/cc-notes_darwin_arm64_fuse darwin_arm64
          bash "$MACOS_CODESIGN_SCRIPT" dist/cc-notes_darwin_amd64_fuse darwin_amd64
      - name: Smoke (fuse binary without fuse-t)
        # The fuse binary dlopens libfuse-t lazily, so it must run cleanly on a Mac
        # that has no fuse-t. The runner is arm64 and has none. `mount` detaches by
        # default: it SPAWNS a mount holder that cannot load libfuse-t, so the holder
        # reports the failure, the command exits 1 with a "fuse" hint, and RETURNS
        # rather than blocking. `mount --foreground` fails the same way in-process.
        run: |
          brew uninstall fuse-t || true
          sudo rm -f /usr/local/lib/libfuse-t*
          test ! -e /usr/local/lib/libfuse-t.dylib
          BIN=dist/cc-notes_darwin_arm64_fuse
          export HOME="$RUNNER_TEMP/ccn-home"
          mkdir -p "$HOME" "$RUNNER_TEMP/ccn-mp"
          "$BIN" version | grep -q "${GITHUB_REF_NAME}"
          set +e
          out="$("$BIN" mount "$RUNNER_TEMP/ccn-mp" 2>&1)"
          code=$?
          set -e
          echo "detached: $out"
          test "$code" -eq 1
          echo "$out" | grep -qi fuse
          set +e
          out="$("$BIN" mount --foreground "$RUNNER_TEMP/ccn-mp" 2>&1)"
          code=$?
          set -e
          echo "foreground: $out"
          test "$code" -eq 1
          echo "$out" | grep -qi fuse
          "$BIN" mount --shutdown 2>&1 || true
          rm -rf "$HOME/.cc-notes"
      - uses: actions/upload-artifact@v7
        with:
          name: cc-notes_darwin_fuse
          path: dist/cc-notes_darwin_*_fuse
          if-no-files-found: error

  fuse-linux:
    name: fuse linux/amd64
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install libfuse headers
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev
      - name: Build linux/amd64 fuse variant
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${GITHUB_REF_NAME} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/cc-notes_linux_amd64_fuse ./cmd/cc-notes
      - uses: actions/upload-artifact@v7
        with:
          name: cc-notes_linux_amd64_fuse
          path: dist/cc-notes_linux_amd64_fuse
          if-no-files-found: error

  smoke-linux:
    name: smoke linux (pure + fuse)
    runs-on: ubuntu-latest
    needs: [pure, fuse-linux]
    steps:
      - uses: actions/checkout@v7 # cwd is a git repo so mount can open the store
      - uses: actions/download-artifact@v8
        with:
          name: cc-notes_linux_amd64
          path: bin
      - uses: actions/download-artifact@v8
        with:
          name: cc-notes_linux_amd64_fuse
          path: bin
      - name: Smoke both linux binaries
        run: |
          chmod +x bin/cc-notes_linux_amd64 bin/cc-notes_linux_amd64_fuse
          export HOME="$RUNNER_TEMP/ccn-home"
          mkdir -p "$HOME"
          for BIN in bin/cc-notes_linux_amd64 bin/cc-notes_linux_amd64_fuse; do
            "$BIN" version | grep -q "${GITHUB_REF_NAME}"
          done
          for MODE in "" "--foreground"; do
            set +e
            out="$(bin/cc-notes_linux_amd64 mount $MODE /tmp/ccn-pure 2>&1)"
            code=$?
            set -e
            echo "pure $MODE: $out"
            test "$code" -eq 1
            echo "$out" | grep -qi fuse
          done
          set +e
          out="$(bin/cc-notes_linux_amd64_fuse mount /tmp/ccn-fuse 2>&1)"
          code=$?
          set -e
          echo "fuse detached: $out"
          test "$code" -eq 1
          echo "$out" | grep -qi fuse
          set +e
          out="$(bin/cc-notes_linux_amd64_fuse mount --foreground /tmp/ccn-fuse 2>&1)"
          code=$?
          set -e
          echo "fuse foreground: $out"
          test "$code" -eq 1
          echo "$out" | grep -qi fuse
          bin/cc-notes_linux_amd64_fuse mount --shutdown 2>&1 || true
          rm -rf "$HOME/.cc-notes"

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: [pure, fuse-macos, fuse-linux, smoke-linux]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Assemble dist and checksums
        run: |
          mkdir -p dist
          find artifacts -type f -name 'cc-notes_*' -exec cp {} dist/ \;
          cd dist
          sha256sum cc-notes_* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --generate-notes $PRERELEASE
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" dist/* --clobber

  bump-formula:
    runs-on: ubuntu-latest
    needs: [release]
    # Prerelease tags (v1.2.3-rc.1) publish assets but never touch the formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      # cc-notes' own checkout: the formula template lives here, and the capt-hook
      # manifest bump is committed back here.
      - uses: actions/checkout@v7
        with:
          ref: main
      - name: Extract the fuse asset checksums
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" --pattern SHA256SUMS.txt --output sums.txt
          sha() { awk -v a="$1" '$2 == a {print $1}' sums.txt; }
          da="$(sha cc-notes_darwin_arm64_fuse)"; dx="$(sha cc-notes_darwin_amd64_fuse)"
          la="$(sha cc-notes_linux_arm64)"; lx="$(sha cc-notes_linux_amd64_fuse)"
          test -n "$da" && test -n "$dx" && test -n "$la" && test -n "$lx"
          {
            echo "darwin_arm64=$da"
            echo "darwin_amd64=$dx"
            echo "linux_amd64=$lx"
            echo "linux_arm64=$la"
          } >> "$GITHUB_OUTPUT"
      - name: Render Formula/cc-notes.rb
        uses: yasyf/homebrew-tap/.github/actions/render-formula@v1
        with:
          template: .github/formula/cc-notes.rb.tmpl
          output: Formula/cc-notes.rb
          substitutions: |
            __SHA_DARWIN_ARM64__=${{ steps.shas.outputs.darwin_arm64 }}
            __SHA_DARWIN_AMD64__=${{ steps.shas.outputs.darwin_amd64 }}
            __SHA_LINUX_AMD64__=${{ steps.shas.outputs.linux_amd64 }}
            __SHA_LINUX_ARM64__=${{ steps.shas.outputs.linux_arm64 }}
      - name: Publish Formula to the tap
        uses: yasyf/homebrew-tap/.github/actions/publish@v1
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "cc-notes ${{ github.ref_name }}"
      - name: Bump the capt-hook manifest in cc-notes main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          M=.claude/capt-hook.toml
          sed -i -E "s|^version = \"[^\"]+\"|version = \"${VERSION}\"|" "$M"
          grep -q "version = \"${VERSION}\"" "$M"
          if git diff --quiet "$M"; then
            echo "capt-hook manifest already at ${VERSION}; nothing to push"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$M"
            git commit -m "capt-hook: bump to ${VERSION}"
            git push origin main
          fi
