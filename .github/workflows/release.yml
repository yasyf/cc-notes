name: Release

# Tag-driven release. Pushing a vX.Y.Z tag cross-compiles the pure static
# binaries (CGO off) plus the FUSE variants (cgo, -tags fuse), smoke-tests that
# they run on a host WITHOUT a fuse library installed, then publishes them with
# a SHA256SUMS manifest to the GitHub release for the tag. scripts/install.sh
# downloads these assets, preferring the _fuse build where one exists.

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pure:
    name: pure ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${GITHUB_REF_NAME} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o "dist/cc-notes_${GOOS}_${GOARCH}" ./cmd/cc-notes
      - uses: actions/upload-artifact@v7
        with:
          name: cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  fuse-macos:
    name: fuse darwin (arm64 + amd64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install fuse-t (build-time headers only)
        # cgofuse compiles against fuse.h; fuse-t ships the headers. The
        # library itself is dlopened lazily at runtime, so it is uninstalled
        # again before the smoke step below.
        run: brew install macos-fuse-t/cask/fuse-t
      - name: Build darwin fuse variants
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${GITHUB_REF_NAME} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          # Native arm64 slice.
          CGO_ENABLED=1 GOARCH=arm64 go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/cc-notes_darwin_arm64_fuse ./cmd/cc-notes
          # amd64 slice cross-compiles against the fat macOS SDK.
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/cc-notes_darwin_amd64_fuse ./cmd/cc-notes
          # Ad-hoc signature is mandatory on arm64; sign both slices.
          codesign --force -s - dist/cc-notes_darwin_arm64_fuse
          codesign --force -s - dist/cc-notes_darwin_amd64_fuse
      - name: Smoke (fuse binary without fuse-t)
        # The fuse binary dlopens libfuse-t lazily, so it must run cleanly on a
        # Mac that has no fuse-t. The runner is arm64 and has none — prove the
        # native slice reports its version and that `mount` fails gracefully
        # with the install hint (exit 1, not a crash signal) rather than serving.
        run: |
          # The cask uninstall can exit nonzero on CI runners and may leave the
          # pkg-installed dylibs behind; remove them explicitly so the
          # no-fuse-t assertion below stays strict.
          brew uninstall fuse-t || true
          sudo rm -f /usr/local/lib/libfuse-t*
          test ! -e /usr/local/lib/libfuse-t.dylib
          BIN=dist/cc-notes_darwin_arm64_fuse
          "$BIN" version | grep -q "${GITHUB_REF_NAME}"
          mkdir -p "$RUNNER_TEMP/ccn-mp"
          set +e
          out="$("$BIN" mount "$RUNNER_TEMP/ccn-mp" 2>&1)"
          code=$?
          set -e
          echo "$out"
          test "$code" -eq 1
          echo "$out" | grep -qi fuse
      - uses: actions/upload-artifact@v7
        with:
          name: cc-notes_darwin_fuse
          path: dist/cc-notes_darwin_*_fuse
          if-no-files-found: error

  fuse-linux:
    name: fuse linux/amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install libfuse headers
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev
      - name: Build linux/amd64 fuse variant
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${GITHUB_REF_NAME} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/cc-notes_linux_amd64_fuse ./cmd/cc-notes
      - uses: actions/upload-artifact@v7
        with:
          name: cc-notes_linux_amd64_fuse
          path: dist/cc-notes_linux_amd64_fuse
          if-no-files-found: error

  smoke-linux:
    name: smoke linux (pure + fuse)
    runs-on: ubuntu-latest
    needs: [pure, fuse-linux]
    steps:
      - uses: actions/checkout@v6 # cwd is a git repo so mount can open the store
      - uses: actions/download-artifact@v8
        with:
          name: cc-notes_linux_amd64
          path: bin
      - uses: actions/download-artifact@v8
        with:
          name: cc-notes_linux_amd64_fuse
          path: bin
      - name: Smoke both linux binaries
        run: |
          chmod +x bin/cc-notes_linux_amd64 bin/cc-notes_linux_amd64_fuse
          for BIN in bin/cc-notes_linux_amd64 bin/cc-notes_linux_amd64_fuse; do
            "$BIN" version | grep -q "${GITHUB_REF_NAME}"
          done
          # Pure binary: mount prints the install hint and exits 1.
          set +e
          out="$(bin/cc-notes_linux_amd64 mount /tmp/ccn-x 2>&1)"
          code=$?
          set -e
          echo "$out"
          test "$code" -eq 1
          echo "$out" | grep -qi fuse
          # Fuse binary: mount on a missing mountpoint fails gracefully (exit 1,
          # no crash dump) without ever blocking on a live mount.
          set +e
          out="$(bin/cc-notes_linux_amd64_fuse mount /tmp/ccn-x 2>&1)"
          code=$?
          set -e
          echo "$out"
          test "$code" -eq 1

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: [pure, fuse-macos, fuse-linux, smoke-linux]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Assemble dist and checksums
        run: |
          mkdir -p dist
          find artifacts -type f -name 'cc-notes_*' -exec cp {} dist/ \;
          cd dist
          sha256sum cc-notes_* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --generate-notes $PRERELEASE
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" dist/* --clobber

  bump-formula:
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: write
    # Prerelease tags (v1.2.3-rc.1) publish assets but never touch the formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Bump Formula to the release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release download "$GITHUB_REF_NAME" --pattern SHA256SUMS.txt --output sums.txt
          sha() { awk -v a="$1" '$2 == a {print $1}' sums.txt; }
          DARWIN_ARM64="$(sha cc-notes_darwin_arm64_fuse)"
          DARWIN_AMD64="$(sha cc-notes_darwin_amd64_fuse)"
          LINUX_AMD64="$(sha cc-notes_linux_amd64_fuse)"
          LINUX_ARM64="$(sha cc-notes_linux_arm64)"
          test -n "$DARWIN_ARM64" && test -n "$DARWIN_AMD64" && test -n "$LINUX_AMD64" && test -n "$LINUX_ARM64"
          F=Formula/cc-notes.rb
          # The urls interpolate v#{version}, so only the version line and the
          # four marker-anchored shas need rewriting.
          sed -i -E "s|^  version \"[^\"]+\"|  version \"${VERSION}\"|" "$F"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\" # darwin-arm64|sha256 \"${DARWIN_ARM64}\" # darwin-arm64|" "$F"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\" # darwin-amd64|sha256 \"${DARWIN_AMD64}\" # darwin-amd64|" "$F"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\" # linux-amd64|sha256 \"${LINUX_AMD64}\" # linux-amd64|" "$F"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\" # linux-arm64|sha256 \"${LINUX_ARM64}\" # linux-arm64|" "$F"
          # Fail loud if a sed anchor stopped matching; allow idempotent re-runs.
          grep -q "version \"${VERSION}\"" "$F"
          grep -q "${DARWIN_ARM64}\" # darwin-arm64" "$F"
          grep -q "${DARWIN_AMD64}\" # darwin-amd64" "$F"
          grep -q "${LINUX_AMD64}\" # linux-amd64" "$F"
          grep -q "${LINUX_ARM64}\" # linux-arm64" "$F"
          if git diff --quiet; then
            echo "formula already at ${GITHUB_REF_NAME}; nothing to push"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$F"
          git commit -m "Formula: bump to ${GITHUB_REF_NAME}"
          git push origin main
