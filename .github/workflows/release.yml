name: Release

# Tag-driven release. Pushing a vX.Y.Z tag cross-compiles static binaries, smoke-tests
# them, publishes a SHA256SUMS manifest, then renders Formula/cc-notes.rb and publishes
# it to the tap through the shared homebrew-tap actions.

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  web-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: yasyf/homebrew-tap/.github/actions/verify-tag-on-main@v1

  pure:
    name: pure ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [verify-tag-on-main, web-dist]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/web-dist
      - name: Build static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${GITHUB_REF_NAME} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          CGO_ENABLED=0 go build -tags webui -ldflags "$LDFLAGS" -o "dist/cc-notes_${GOOS}_${GOARCH}" ./cmd/cc-notes
      - uses: actions/upload-artifact@v7
        with:
          name: cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/cc-notes_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  smoke-linux:
    name: smoke linux
    runs-on: ubuntu-latest
    needs: [pure]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cc-notes_linux_amd64
          path: bin
      - name: Smoke linux binary
        run: |
          chmod +x bin/cc-notes_linux_amd64
          bin/cc-notes_linux_amd64 version | grep -q "${GITHUB_REF_NAME}"

  smoke-macos:
    name: smoke macos (pure)
    runs-on: macos-latest
    needs: [pure]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cc-notes_darwin_arm64
          path: bin
      - name: Smoke pure darwin binary and signed-holder boundary
        run: |
          chmod +x bin/cc-notes_darwin_arm64
          BIN="$PWD/bin/cc-notes_darwin_arm64"
          "$BIN" version | grep -q "${GITHUB_REF_NAME}"
          export HOME="$RUNNER_TEMP/ccn-home"
          mkdir -p "$HOME"
          REMOTE="$RUNNER_TEMP/ccn-remote"
          REPO="$RUNNER_TEMP/ccn-repo"
          git init -q --bare "$REMOTE"
          mkdir -p "$REPO"
          cd "$REPO"
          git init -q
          git config user.name smoke
          git config user.email smoke@example.com
          git remote add origin "$REMOTE"
          # This release's signed-holder asset is not published yet (the release
          # job needs this smoke job), so a pure init must fail loudly at the
          # holder-fetch boundary rather than provision FuseKit unsigned.
          if "$BIN" init >init.out 2>init.err; then
            echo "::error::pure release CLI provisioned FuseKit without a verified CCNotesHolder.app"
            exit 1
          fi
          grep -Fq 'cc-notes holder: fetch signed app' init.err
          "$BIN" note add "smoke test note"
          out="$("$BIN" note list)"
          echo "$out"
          echo "$out" | grep -q "smoke test note"

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: [pure, smoke-linux, smoke-macos]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Assemble dist and checksums
        run: |
          mkdir -p dist
          find artifacts -type f -name 'cc-notes_*' -exec cp {} dist/ \;
          cd dist
          sha256sum cc-notes_* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --generate-notes $PRERELEASE
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" dist/* --clobber

  holder-app:
    name: fixed signed holder app
    runs-on: macos-15
    needs: [verify-tag-on-main, release]
    outputs:
      sha256: ${{ steps.package.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Import Developer ID certificate
        uses: yasyf/homebrew-tap/.github/actions/import-developer-id@v1
        with:
          p12: ${{ secrets.MACOS_SIGN_P12 }}
          p12-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          notary-key: ${{ secrets.MACOS_NOTARY_KEY }}
          notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Install reviewed FUSE-T packaging input
        run: brew install macos-fuse-t/cask/fuse-t

      - name: Build and assemble the universal fixed app
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          MARKETING="${VERSION#v}"
          MARKETING="${MARKETING%%-*}"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-notes/internal/version.Version=${VERSION} -X github.com/yasyf/cc-notes/internal/version.Commit=${COMMIT}"
          APP="$PWD/dist/CCNotesHolder.app"
          mkdir -p "$APP/Contents/MacOS"

          CGO_ENABLED=1 GOARCH=arm64 go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/holder-arm64 ./cmd/cc-notes-holder
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" go build -tags fuse -ldflags "$LDFLAGS" \
            -o dist/holder-amd64 ./cmd/cc-notes-holder
          lipo -create -output "$APP/Contents/MacOS/CCNotesHolder" dist/holder-arm64 dist/holder-amd64

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>CCNotesHolder</string>
            <key>CFBundleIdentifier</key><string>com.yasyf.cc-notes.holder</string>
            <key>CFBundleName</key><string>CCNotesHolder</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${MARKETING}</string>
            <key>CFBundleVersion</key><string>${GITHUB_RUN_NUMBER}</string>
            <key>LSMinimumSystemVersion</key><string>15.0</string>
            <key>LSUIElement</key><true/>
          </dict></plist>
          PLIST

          REQUIREMENTS="$RUNNER_TEMP/cc-notes-holder.requirements"
          cat > "$REQUIREMENTS" <<'REQUIREMENTS'
          designated => identifier "com.yasyf.cc-notes.holder" and anchor apple generic and certificate leaf[subject.OU] = "SXKCTF23Q2" and certificate 1[field.1.2.840.113635.100.6.2.6] exists and certificate leaf[field.1.2.840.113635.100.6.1.13] exists
          REQUIREMENTS

          codesign --force --options runtime --timestamp \
            --identifier com.yasyf.cc-notes.holder \
            --requirements "$REQUIREMENTS" \
            --sign "$MACOS_SIGN_IDENTITY" "$APP"
          APP_PATH="$APP" TEAM_ID="$TEAM_ID" DESIGNATED_REQUIREMENT_FILE="$REQUIREMENTS" \
            bash .github/scripts/assert-holder-app.sh

      - id: package
        name: Notarize, staple, and package the fixed app
        uses: yasyf/homebrew-tap/.github/actions/sign-notarize-app@v1
        with:
          app: dist/CCNotesHolder.app
          name: cc-notes-holder
          sign: "false"
          bundle-id: com.yasyf.cc-notes.holder
          attach-to-release: "true"

  bump-formula:
    runs-on: ubuntu-latest
    needs: [release, holder-app]
    # Prerelease tags (v1.2.3-rc.1) publish assets but never touch the formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      # cc-notes' own checkout: the formula template lives here, and the capt-hook
      # manifest bump is committed back here.
      - uses: actions/checkout@v7
        with:
          ref: main
      - name: Extract asset checksums
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" --pattern SHA256SUMS.txt --output sums.txt
          sha() { awk -v a="$1" '$2 == a {print $1}' sums.txt; }
          da="$(sha cc-notes_darwin_arm64)"; dx="$(sha cc-notes_darwin_amd64)"
          la="$(sha cc-notes_linux_arm64)"; lx="$(sha cc-notes_linux_amd64)"
          test -n "$da" && test -n "$dx" && test -n "$la" && test -n "$lx"
          {
            echo "darwin_arm64=$da"
            echo "darwin_amd64=$dx"
            echo "linux_amd64=$lx"
            echo "linux_arm64=$la"
          } >> "$GITHUB_OUTPUT"
      - name: Render Formula/cc-notes.rb
        uses: yasyf/homebrew-tap/.github/actions/render-formula@v1
        with:
          template: .github/formula/cc-notes.rb.tmpl
          output: Formula/cc-notes.rb
          substitutions: |
            __SHA_DARWIN_ARM64__=${{ steps.shas.outputs.darwin_arm64 }}
            __SHA_DARWIN_AMD64__=${{ steps.shas.outputs.darwin_amd64 }}
            __SHA_LINUX_AMD64__=${{ steps.shas.outputs.linux_amd64 }}
            __SHA_LINUX_ARM64__=${{ steps.shas.outputs.linux_arm64 }}
      - name: Publish the exact CLI to the tap
        uses: yasyf/homebrew-tap/.github/actions/publish@v1
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "cc-notes ${{ github.ref_name }}"
