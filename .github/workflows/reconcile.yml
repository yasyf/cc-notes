name: Reconcile

on:
  push:
    branches: [main]

concurrency:
  group: reconcile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Install cc-notes
        run: go install ./cmd/cc-notes

      # No-op gracefully when there is no remote / nothing to reconcile: the
      # commands already exit 0 on "nothing to do".
      - name: Reconcile merged tasks into main
        run: |
          if ! git remote | grep -q .; then
            echo "no remote configured; nothing to reconcile"
            exit 0
          fi
          cc-notes sync
          cc-notes reconcile --into main
          cc-notes sync
