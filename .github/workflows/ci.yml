name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build (default, pure Go)
        run: go build ./...

      - name: Cross-compile smoke (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/cc-notes_linux_amd64 ./cmd/cc-notes

      - name: Cross-compile smoke (darwin/arm64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/cc-notes_darwin_arm64 ./cmd/cc-notes
