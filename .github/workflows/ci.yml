name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build (default, pure Go)
        run: go build ./...

      - name: Cross-compile smoke (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/cc-notes_linux_amd64 ./cmd/cc-notes

      - name: Cross-compile smoke (darwin/arm64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/cc-notes_darwin_arm64 ./cmd/cc-notes

  holder:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Install FUSE-T headers
        run: brew install macos-fuse-t/cask/fuse-t
      - name: Build the dedicated signed-holder target
        run: CGO_ENABLED=1 go build -tags fuse ./cmd/cc-notes-holder
      - name: Prove the ordinary CLI has no FuseKit child dispatcher
        run: |
          CGO_ENABLED=0 go build -o /tmp/cc-notes ./cmd/cc-notes
          if strings -a /tmp/cc-notes | grep -q -- '--fusekit-'; then
            echo "::error::ordinary cc-notes CLI still embeds a FuseKit child mode"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"

      - uses: ./.github/actions/setup

      - name: Build cc-notes binary onto PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          go build -o "$HOME/.local/bin/cc-notes" ./cmd/cc-notes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache NLP resources
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/spacy/models
            ~/.wn_data
          key: capt-hook-nlp-en_core_web_sm-oewn2025

      - name: Provision NLP resources (spaCy en_core_web_sm + oewn:2025 lexicon)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run --no-project --with capt-hook python -c "from captain_hook.util.model_cache import ensure_nlp_resources; ensure_nlp_resources()"

      - name: capt-hook pack test
        run: uvx --isolated 'capt-hook>=12.0.0' pack test plugin

      - name: pack unit tests
        run: uv run plugin/capt-hook/hooks/tests/test_cc_notes.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test
        working-directory: web
        run: npm test

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist

  webui:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup

      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Verify embedded dist present
        run: test -f web/dist/index.html

      - name: go vet (webui)
        run: go vet -tags webui ./...

      - name: Build (webui)
        run: go build -tags webui ./...

      - name: Test web package (webui)
        run: go test -tags webui -timeout 300s -count=1 ./web
