name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build (default, pure Go)
        run: go build ./...

      - name: Cross-compile smoke (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/cc-notes_linux_amd64 ./cmd/cc-notes

      - name: Cross-compile smoke (darwin/arm64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/cc-notes_darwin_arm64 ./cmd/cc-notes

  fuse:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Install fuse-t (build-time headers + dylib)
        run: brew install macos-fuse-t/cask/fuse-t

      - name: go vet (fuse)
        run: CGO_ENABLED=1 go vet -tags fuse ./...

      - name: Build smoke (fuse)
        run: CGO_ENABLED=1 go build -tags fuse ./...

      # Callback-level only: a live mount needs the one-time macOS
      # "Network Volumes" TCC grant, which is impossible on a CI runner.
      - name: Test fusefs callbacks
        run: CGO_ENABLED=1 go test -tags fuse -count=1 ./internal/fusefs

      - name: Build (default, pure Go stays green)
        run: CGO_ENABLED=0 go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Build cc-notes binary onto PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          go build -o "$HOME/.local/bin/cc-notes" ./cmd/cc-notes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache NLP resources
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/spacy/models
            ~/.wn_data
          key: capt-hook-nlp-en_core_web_sm-oewn2025

      - name: Provision NLP resources (spaCy en_core_web_sm + oewn:2025 lexicon)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run --no-project --with capt-hook python -c "from captain_hook.util.model_cache import ensure_nlp_resources; ensure_nlp_resources()"

      - name: capt-hook test
        run: uvx capt-hook --hooks plugin/hooks test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test
        working-directory: web
        run: npm test

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist

  webui:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Verify embedded dist present
        run: test -f web/dist/index.html

      - name: go vet (webui)
        run: go vet -tags webui ./...

      - name: Build (webui)
        run: go build -tags webui ./...

      - name: Test web package (webui)
        run: go test -tags webui -timeout 300s -count=1 ./web
